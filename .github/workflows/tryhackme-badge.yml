name: Update TryHackMe Badge

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "assets/thm_propic.png"

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Capture TryHackMe badge
        env:
          THM_USERNAME: harryschlorke
          THM_USER_PUBLIC_ID: ${{ secrets.THM_USER_PUBLIC_ID }}
          THM_OUTPUT: ./assets/thm_propic.png
        run: node scripts/capture-thm-badge.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/thm_propic.png
          git diff --staged --quiet || git commit -m "🛡️ Update TryHackMe badge [auto-update]"
          git push
