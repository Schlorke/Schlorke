name: TryHackMe Update Badge

on:
  # Sem agendamento diário de propósito: a geração do badge no TryHackMe está
  # quebrada (retorna "error while generating"), então rodar sozinho só
  # arriscaria sobrescrever a imagem boa por uma de erro / mandar e-mail de
  # falha todo dia. Rode na mão pela aba Actions -> "Run workflow" quando
  # quiser testar. Pra voltar a rodar diariamente, descomente o bloco abaixo:
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  tryhackme-badge-update:
    name: Update TryHackMe profile badge
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: p4p1/tryhackme-badge-workflow@main
        with:
          username: harryschlorke
          use_static_image: "false"
          # ID público do perfil (não é segredo — vem da API pública do TryHackMe).
          # Hardcoded de propósito pra não depender de configurar um secret.
          user_public_id: "69b9f2a48c6b9220a3ad48a9"
          image_path: ./assets/thm_propic.png
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
